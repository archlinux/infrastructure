archweb_db_host: "{{ hostvars['archlinux.org']['wireguard_address'] }}"

# raise tcp window limits to 32MiB
tcp_rmem: "10240 87380 33554432"
tcp_wmem: "10240 87380 33554432"

nginx_enable_http3: true
nginx_stream: true

ignore_package_upgrades:
  # Causes issues with rsync-ssl:
  # - https://gitlab.archlinux.org/archlinux/infrastructure/-/issues/818
  # - https://github.com/RsyncProject/rsync/issues/869
  # - https://github.com/openssl/openssl/issues/30925
  - openssl
