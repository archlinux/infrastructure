- name: Install fail2ban
  package:
    name: "fail2ban"
    state: "present"
  notify:
    - Restart fail2ban

- name: Create systemd unit override path
  file:
    path: "/etc/systemd/system/fail2ban.service.d"
    state: "directory"
    owner: "root"
    group: "root"
    mode: '0755'

- name: Install systemd unit override file
  template:
    src: "fail2ban.service.j2"
    dest: "/etc/systemd/system/fail2ban.service.d/override.conf"
    owner: "root"
    group: "root"
    mode: '0644'

- name: Install local config files
  template:
    src: "{{ item }}.j2"
    dest: "/etc/fail2ban/{{ item }}"
    owner: "root"
    group: "root"
    mode: '0644'
  loop:
    - "fail2ban.local"
    - "jail.local"
  notify:
    - Restart fail2ban

- name: Install firewallcmd-ipset-allports.conf
  template:
    src: "firewallcmd-ipset-allports.conf.j2"
    dest: "/etc/fail2ban/action.d/firewallcmd-ipset-allports.conf"
    owner: "root"
    group: "root"
    mode: '0644'
  notify:
    - Restart fail2ban

- name: Install sshd jail
  when: fail2ban_jails.sshd
  template:
    src: "sshd.jail.j2"
    dest: "/etc/fail2ban/jail.d/sshd.local"
    owner: "root"
    group: "root"
    mode: '0644'
  notify:
    - Reload fail2ban jails

- name: Install postfix jail
  when: fail2ban_jails.postfix
  template:
    src: "postfix.jail.j2"
    dest: "/etc/fail2ban/jail.d/postfix.local"
    owner: "root"
    group: "root"
    mode: '0644'
  notify:
    - Reload fail2ban jails

- name: Install dovecot jail
  when: fail2ban_jails.dovecot
  template:
    src: "dovecot.jail.j2"
    dest: "/etc/fail2ban/jail.d/dovecot.local"
    owner: "root"
    group: "root"
    mode: '0644'
  notify:
    - Reload fail2ban jails

- name: Install nginx-limit-req jail
  when: fail2ban_jails.nginx_limit_req
  template:
    src: "nginx-limit-req.jail.j2"
    dest: "/etc/fail2ban/jail.d/nginx-limit-req.local"
    owner: "root"
    group: "root"
    mode: '0644'
  notify:
    - Reload fail2ban jails

- name: Install fail2ban ipset for firewalld
  template: src=fail2ban.xml.j2 dest=/etc/firewalld/ipsets/{{ item.set }}.xml owner=root group=root mode=0644
  loop:
    - {family: inet, set: fail2ban}
    - {family: inet6, set: fail2ban6}
  register: result

- name: Restart firewalld
  systemd_service: name=firewalld state=restarted
  when: result.changed

- name: Add fail2ban ipset to the firewalld drop zone
  ansible.posix.firewalld: source=ipset:{{ item }} zone=drop permanent=true immediate=true state=enabled
  loop:
    - fail2ban
    - fail2ban6

- name: Install script dependencies
  pacman: name=python,python-redis state=present

- name: Install blacklist-ban and blacklist-syncer scripts
  template: src={{ item }}.j2 dest=/usr/local/bin/{{ item }} owner=root group=root mode=0755
  loop:
    - blacklist-ban
    - blacklist-syncer
  notify: Restart blacklist-syncer

- name: Intall blacklist-syncer service
  copy: src=blacklist-syncer.service dest=/etc/systemd/system/blacklist-syncer.service owner=root group=root mode=0644

- name: Start and enable blacklist-syncer
  service: name=blacklist-syncer enabled=yes state=started

- name: Start and enable service
  systemd_service:
    name: "fail2ban.service"
    enabled: true
    state: started
    daemon-reload: true
